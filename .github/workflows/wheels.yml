name: Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
     - master 
  release:
    types:
      - published

env:
  CIBW_TEST_REQUIRES: pytest 
  CIBW_TEST_COMMAND: pytest {project}/tests

jobs:

  semantic_release:
    name: Run semantic release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-python@v4
        name: Install Python
        with:
          python-version: '3.11'

      - name: Run python-semantic-release
        run: |
          pip install uv
          uv pip install --system python-semantic-release
          git config --global user.email "d0m3nik@users.noreply.github.com"
          git config --global user.name "Dominik Brugger"
          semantic-release version 

      - name: Push version
        if: github.event_name != 'release' || github.event.action != 'published'
        run: |
          git push
          git push --tags
          
  build_wheels:
    name: Build cp${{ matrix.python }} on ${{ matrix.os }}
    needs: semantic_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, ubuntu-24.04-arm, macos-15-intel]
        python: ["310", "311", "312", "313", "314"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v4
        name: Install Python
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: |
          python -m pip install cibuildwheel==3.4.1

      - name: Build wheels
        run: |
          python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BEFORE_ALL_LINUX: pip install uv && yum install -y libX11-devel
          CIBW_BEFORE_ALL_MACOS: pip install uv && brew install --cask xquartz
          CIBW_BEFORE_ALL_WINDOWS: pip install uv
          CIBW_BEFORE_BUILD: uv pip install --system conan>=2.0.0 && uv pip install --system -r requirements.txt && conan profile detect --force && conan install . --build=missing
          CIBW_BUILD: "cp${{ matrix.python }}-*"
          CIBW_SKIP: "*-win32 *-musllinux_* *-manylinux_i686 *ppc64* *s390*"
          CIBW_CONFIG_SETTINGS: skbuild.cmake.args="-DCMAKE_TOOLCHAIN_FILE:FILEPATH=conan_toolchain.cmake"
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=10.15"

      - uses: actions/upload-artifact@v4
        with:
          path: ./wheelhouse/*.whl
      
  build_sdist:
    name: Build source distribution
    needs: semantic_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v4
        name: Install Python
        with:
          python-version: '3.11'

      - name: Build sdist
        run: pip install uv && uv pip install --system build && uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          path: dist/*.tar.gz

  coverage:
    name: Run coverage analysis
    needs: semantic_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v4
        name: Install Python
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev

      - name: Install dependencies and build
        run: |
          pip install uv
          uv pip install --system conan>=2.0.0
          uv pip install --system -r requirements.txt
          conan profile detect --force
          conan install . --build=missing
          uv pip install --system -e . -C "skbuild.cmake.args=-DCMAKE_TOOLCHAIN_FILE:FILEPATH=conan_toolchain.cmake"
      
      - name: Run coverage test
        run:  pytest --cov-report term-missing --cov-report xml:coverage.xml --cov pycimg tests/

      - name: Upload codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # upload to PyPI on every tag starting with 'v'
    #if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/v')
    # alternatively, to publish when a GitHub Release is created, use the following rule:
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: artifact
          path: dist

      - uses: pypa/gh-action-pypi-publish@master
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          #password: ${{ secrets.TEST_PYPI_TOKEN }}
          #repository_url: https://test.pypi.org/legacy/